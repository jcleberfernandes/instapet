<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaPet – Perfil</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <nav-bar></nav-bar>

  <div class="profile-layout">
    <div id="profile-header-container"></div>
    <div id="profile-grid-container"></div>
  </div>

  <profile-edit-modal></profile-edit-modal>
  <profile-users-modal></profile-users-modal>

  <app-footer></app-footer>

  <script type="module">
    import '../webcomponent/layout/navbar.js';
    import '../webcomponent/layout/footer.js';
    import '../webcomponent/profile/profile-header.js';
    import '../webcomponent/profile/profile-grid.js';
    import '../webcomponent/profile/profile-edit-modal.js';
    import '../webcomponent/profile/profile-users-modal.js';
    import { getMe, getUser } from '../services/users.js';
    import { getPosts } from '../services/posts.js';

    const params        = new URLSearchParams(window.location.search);
    const usernameParam = params.get('user');
    const isOwnProfile  = !usernameParam;

    if (isOwnProfile && !localStorage.getItem('token')) {
      window.location.replace('/pages/login.html');
    }

    // ── Sync header stat counters after follow/unfollow in users modal ──
    function nudgeHeaderStat(index, delta) {
      const el = document.querySelectorAll('#profile-header-container .profile-header__stat-value')[index];
      if (el) el.textContent = Math.max(0, parseInt(el.textContent || '0') + delta);
    }

    document.addEventListener('profile-follow-change', (e) => {
      const { targetUsername, profileUsername, loggedInUsername, delta } = e.detail;
      if (targetUsername === profileUsername) nudgeHeaderStat(1, delta);
      if (loggedInUsername === profileUsername) nudgeHeaderStat(2, delta);
    });

    document.addEventListener('profile-follow', () => {
      sessionStorage.setItem('feed-stale', '1');
    });

    // ── Load profile ──────────────────────────────────────────────
    async function loadProfile() {
      document.getElementById('profile-header-container').innerHTML = '';
      document.getElementById('profile-grid-container').innerHTML   = '';

      try {
        let user;
        let isEditable = isOwnProfile;

        if (isOwnProfile) {
          user = await getMe();
        } else {
          user = await getUser(usernameParam);
          if (localStorage.getItem('token')) {
            try {
              const me = await getMe();
              isEditable = me.username === user.username;
            } catch {}
          }
        }

        const posts      = await getPosts();
        const userPosts  = posts.filter(p => p.author_username === user.username);
        const totalLikes = userPosts.reduce((sum, p) => sum + (p.like_count ?? 0), 0);

        document.title = `InstaPet – @${user.username}`;

        const header = document.createElement('profile-header');
        header.setAttribute('username',       user.username);
        header.setAttribute('display-name',   user.display_name ?? user.username);
        header.setAttribute('avatar',         user.avatar_url ?? '');
        header.setAttribute('bio',            user.bio ?? '');
        header.setAttribute('followers',      user.follower_count  ?? 0);
        header.setAttribute('following',      user.following_count ?? 0);
        header.setAttribute('likes',          totalLikes);
        header.setAttribute('editable',       isEditable ? 'true' : 'false');
        header.setAttribute('followed-by-me', !isEditable && (user.followed_by_me ?? false) ? 'true' : 'false');
        document.getElementById('profile-header-container').appendChild(header);

        const grid = document.createElement('profile-grid');
        grid.setAttribute('own-profile', isEditable ? 'true' : 'false');
        document.getElementById('profile-grid-container').appendChild(grid);
        grid.setPosts(userPosts);

        if (params.get('tab') === 'saved' && isEditable) {
          const savedTab = grid.querySelector('[data-tab="saved"]');
          if (savedTab) savedTab.click();
        }

      } catch (e) {
        console.error(e);
        document.getElementById('profile-header-container').innerHTML =
          '<p class="feed__status feed__status--error">Erro ao carregar perfil.</p>';
      }
    }

    window.addEventListener('pageshow', async () => {
      sessionStorage.removeItem('profile-stale');
      await loadProfile();
    });
  </script>

</body>
</html>
