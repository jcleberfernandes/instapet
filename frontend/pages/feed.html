<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaPet – Feed</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <nav-bar logo="🐾 InstaPet"></nav-bar>

  <div class="layout">

    <aside class="sidebar" id="left-sidebar-container"></aside>

    <main class="feed" id="feed-container">
      <p class="feed__status">A carregar posts...</p>
    </main>

    <aside class="sidebar">
      <feed-sidebar-right></feed-sidebar-right>
    </aside>

  </div>

  <app-footer></app-footer>

  <script type="module">
    import '../webcomponent/layout/navbar.js';
    import '../webcomponent/layout/footer.js';
    import '../webcomponent/ui/button.js';
    import '../webcomponent/ui/postcard.js';
    import '../webcomponent/feed/feed-sidebar-left/feed-sidebar-left.js';
    import '../webcomponent/feed/feed-sidebar-right/feed-sidebar-right.js';
    import '../webcomponent/feed/post-form/post-form.js';
    import { getPosts, likePost, unlikePost, savePost, unsavePost, createPost } from '../services/posts.js';
    import { getMe } from '../services/users.js';

    const feedContainer         = document.getElementById('feed-container');
    const leftSidebarContainer  = document.getElementById('left-sidebar-container');

    let currentUser = null;

    async function loadSidebar() {
      const sidebar = document.createElement('feed-sidebar-left');
      try {
        currentUser = await getMe();
        sidebar.setAttribute('username',     currentUser.username ?? '');
        sidebar.setAttribute('display-name', currentUser.display_name ?? currentUser.username ?? '');
        sidebar.setAttribute('avatar',       currentUser.avatar_url ?? '');
        sidebar.setAttribute('likes',        currentUser.like_count ?? '0');
        sidebar.setAttribute('followers',    currentUser.follower_count ?? '0');
        sidebar.setAttribute('following',    currentUser.following_count ?? '0');
      } catch { /* sem sessão, mostra defaults */ }
      leftSidebarContainer.appendChild(sidebar);
    }

    function buildPostCard(post) {
      const card = document.createElement('post-card');
      card.setAttribute('post-id',      post.id);
      card.setAttribute('username',     post.author_username ?? 'user');
      card.setAttribute('avatar',       post.author_avatar_url ?? '');
      card.setAttribute('caption',      post.content ?? '');
      card.setAttribute('image',        post.image_url ?? '');
      card.setAttribute('likes',        post.like_count ?? 0);
      card.setAttribute('comments',     post.comment_count ?? 0);
      card.setAttribute('liked-by-me',  post.liked_by_me ? 'true' : 'false');
      card.setAttribute('saved-by-me',  post.saved_by_me ? 'true' : 'false');
      return card;
    }

    async function loadFeed() {
      try {
        const posts = await getPosts();
        feedContainer.innerHTML = '';

        const form = document.createElement('post-form');
        if (currentUser) {
          form.setAttribute('username',     currentUser.username ?? '');
          form.setAttribute('display-name', currentUser.display_name ?? currentUser.username ?? '');
          form.setAttribute('avatar',       currentUser.avatar_url ?? '');
        }
        feedContainer.appendChild(form);

        if (!posts.length) {
          const empty = document.createElement('p');
          empty.className = 'feed__status';
          empty.textContent = 'Nenhum post ainda. Seja o primeiro!';
          feedContainer.appendChild(empty);
          return;
        }

        posts.forEach(post => feedContainer.appendChild(buildPostCard(post)));
      } catch {
        feedContainer.innerHTML = '<p class="feed__status feed__status--error">Erro ao carregar posts.</p>';
      }
    }

    document.addEventListener('post-submit', async (e) => {
      try {
        const newPost = await createPost({ content: e.detail.content, image_url: e.detail.image_url });
        document.dispatchEvent(new Event('post-created'));

        const card = buildPostCard({
          ...newPost,
          author_username: currentUser?.username ?? '',
          liked_by_me: false,
          saved_by_me: false,
        });

        const form = feedContainer.querySelector('post-form');
        form.insertAdjacentElement('afterend', card);
      } catch (err) {
        console.error('create post error', err);
        document.dispatchEvent(new Event('post-create-error'));
      }
    });

    document.addEventListener('post-like', async (e) => {
      try {
        if (e.detail.liked) await likePost(e.detail.postId);
        else await unlikePost(e.detail.postId);
      } catch (err) { console.error('like error', err); }
    });

    document.addEventListener('post-save', async (e) => {
      try {
        if (e.detail.saved) await savePost(e.detail.postId);
        else await unsavePost(e.detail.postId);
      } catch (err) { console.error('save error', err); }
    });

    await loadSidebar();
    loadFeed();
  </script>

</body>
</html>
