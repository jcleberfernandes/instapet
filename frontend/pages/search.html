<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaPet – Explorar</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <nav-bar></nav-bar>

  <div class="search-page">
    <search-bar id="search-bar"></search-bar>
    <div id="search-results">
      <p class="feed__status">Pesquisa algo para começar.</p>
    </div>
  </div>

  <app-footer></app-footer>

  <script type="module">
    import '../webcomponent/layout/navbar.js';
    import '../webcomponent/layout/footer.js';
    import '../webcomponent/ui/postcard.js';
    import '../webcomponent/search/search-bar/search-bar.js';
    import { avatarHTML } from '../webcomponent/ui/avatar.js';
    import { getPosts, getPopularTags, likePost, unlikePost, savePost, unsavePost } from '../services/posts.js';
    import { getUsers, getMe, followUser, unfollowUser } from '../services/users.js';

    const searchBar = document.getElementById('search-bar');
    const resultsEl = document.getElementById('search-results');

    let currentUser = null;
    let allUsers    = [];

    try { currentUser = await getMe(); } catch {}

    getUsers().then(u => { allUsers = u; searchBar.setUsers(u); }).catch(() => {});
    getPopularTags().then(t => searchBar.setTags(t)).catch(() => {});

    // ── URL params ────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    if (params.get('mode')) searchBar.setMode(params.get('mode'));
    if (params.get('q')) {
      searchBar.setValue(params.get('q'));
      runSearch(params.get('q'), params.get('mode') || 'tags');
    }

    // ── Search events ─────────────────────────────────────────────
    searchBar.addEventListener('search-submit', (e) => {
      runSearch(e.detail.query, e.detail.mode);
    });

    searchBar.addEventListener('search-input', (e) => {
      if (e.detail.mode === 'users') runSearch(e.detail.query, e.detail.mode);
    });

    async function runSearch(query, mode) {
      if (mode === 'tags') await searchTags(query);
      else searchUsers(query);
    }

    // ── Tags search ───────────────────────────────────────────────
    async function searchTags(query) {
      resultsEl.innerHTML = '<p class="feed__status">A pesquisar...</p>';
      try {
        const posts = await getPosts(`?tag=${encodeURIComponent(query.replace(/^#/, ''))}`);
        resultsEl.innerHTML = '';
        if (!posts.length) {
          resultsEl.innerHTML = `<p class="feed__status">Nenhum post com a tag <strong>#${query.replace(/^#/, '')}</strong>.</p>`;
          return;
        }
        const wrap = document.createElement('div');
        wrap.className = 'search-results__list';
        posts.forEach(post => {
          const isOwn = currentUser && post.author_username === currentUser.username;
          const card = document.createElement('post-card');
          card.setAttribute('post-id',         post.id);
          card.setAttribute('username',         post.author_username ?? 'user');
          card.setAttribute('avatar',           post.author_avatar_url ?? '');
          card.setAttribute('caption',          post.content ?? '');
          card.setAttribute('image',            post.image_url ?? '');
          card.setAttribute('likes',            post.like_count ?? 0);
          card.setAttribute('comments',         post.comment_count ?? 0);
          card.setAttribute('liked-by-me',      post.liked_by_me ? 'true' : 'false');
          card.setAttribute('saved-by-me',      post.saved_by_me ? 'true' : 'false');
          card.setAttribute('followed-author',  post.author_followed_by_me ? 'true' : 'false');
          card.setAttribute('own-post',         isOwn ? 'true' : 'false');
          card.setAttribute('tags',             JSON.stringify(post.tags ?? []));
          wrap.appendChild(card);
        });
        resultsEl.appendChild(wrap);
      } catch {
        resultsEl.innerHTML = '<p class="feed__status feed__status--error">Erro ao pesquisar.</p>';
      }
    }

    // ── Users search ──────────────────────────────────────────────
    function searchUsers(query) {
      const q       = query.toLowerCase();
      const matches = allUsers.filter(u =>
        u.username.toLowerCase().includes(q) ||
        (u.display_name || '').toLowerCase().includes(q)
      );
      resultsEl.innerHTML = '';
      if (!matches.length) {
        resultsEl.innerHTML = `<p class="feed__status">Nenhuma pessoa encontrada para "<strong>${query}</strong>".</p>`;
        return;
      }
      const wrap = document.createElement('div');
      wrap.className = 'search-results__list';
      matches.forEach(u => {
        const el = document.createElement('a');
        el.className = 'user-result';
        el.href = `/pages/profile.html?user=${u.username}`;
        el.innerHTML = `
          ${avatarHTML(u.display_name || u.username, u.avatar_url || '', 'user-result__avatar')}
          <div class="user-result__info">
            <span class="user-result__name">${u.display_name || u.username}</span>
            <span class="user-result__handle">@${u.username}</span>
          </div>
          <div class="user-result__stats">${u.follower_count ?? 0} seguidores</div>
        `;
        wrap.appendChild(el);
      });
      resultsEl.appendChild(wrap);
    }

    // ── Post interaction events ───────────────────────────────────
    document.addEventListener('post-like', async (e) => {
      const { postId, liked, likeBtn } = e.detail;
      likeBtn.disabled = true;
      try {
        if (liked) await likePost(postId);
        else await unlikePost(postId);
        likeBtn.classList.toggle('post-card__action-btn--liked', liked);
        const countEl = likeBtn.querySelector('span');
        if (countEl) countEl.textContent = Math.max(0, parseInt(countEl.textContent || '0') + (liked ? 1 : -1));
      } catch (err) { console.error('like error', err); }
      finally { likeBtn.disabled = false; }
    });

    document.addEventListener('post-save', async (e) => {
      const { postId, saved, saveBtn } = e.detail;
      saveBtn.disabled = true;
      try {
        if (saved) await savePost(postId);
        else await unsavePost(postId);
        saveBtn.classList.toggle('post-card__action-btn--saved', saved);
      } catch (err) { console.error('save error', err); }
      finally { saveBtn.disabled = false; }
    });

    document.addEventListener('post-follow', async (e) => {
      try {
        if (e.detail.followed) await followUser(e.detail.username);
        else await unfollowUser(e.detail.username);
      } catch (err) { console.error('follow error', err); }
    });
  </script>

</body>
</html>
