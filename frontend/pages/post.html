<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaPet – Post</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <nav-bar></nav-bar>

  <div class="layout">
    <main class="feed">
      <div id="post-container">
        <p class="feed__status">A carregar post...</p>
      </div>

      <section class="comments-section" id="comments-section" hidden>
        <h3 class="comments-section__title">Comentários</h3>
        <comment-form></comment-form>
        <div id="comments-list" class="comments-list"></div>
      </section>
    </main>

    <aside class="sidebar">
      <div id="author-card"></div>
    </aside>
  </div>

  <app-footer></app-footer>

  <script type="module">
    import '../webcomponent/layout/navbar.js';
    import '../webcomponent/layout/footer.js';
    import '../webcomponent/ui/button.js';
    import '../webcomponent/ui/usercard.js';
    import '../webcomponent/post/comment-form.js';
    import '../webcomponent/post/post-detail/post-detail.js';
    import '../webcomponent/post/comment-item/comment-item.js';
    import { getPost, getComments, createComment, deleteComment, updatePost, deletePost, likePost, unlikePost, savePost, unsavePost } from '../services/posts.js';
    import { getMe, getUser, followUser, unfollowUser } from '../services/users.js';

    const params          = new URLSearchParams(window.location.search);
    const postId          = params.get('id');

    let currentUserId   = null;
    let currentUsername = null;
    try {
      const me = await getMe();
      currentUserId   = me.id;
      currentUsername = me.username;
    } catch { /* não autenticado */ }

    if (!postId) window.location.href = '/pages/feed.html';

    const postContainer   = document.getElementById('post-container');
    const commentsSection = document.getElementById('comments-section');
    const commentsList    = document.getElementById('comments-list');
    const authorCard      = document.getElementById('author-card');

    async function loadPost() {
      try {
        const post = await getPost(postId);

        document.title = `InstaPet – Post de @${post.author_username ?? 'user'}`;

        const isMyPost = (currentUserId && post.author_id === currentUserId)
                      || (currentUsername && post.author_username === currentUsername);

        postContainer.innerHTML = '';
        const detail = document.createElement('post-detail');
        detail.setAttribute('post-id',  post.id);
        detail.setAttribute('username', post.author_username ?? 'user');
        detail.setAttribute('avatar',   post.author_avatar_url ?? '');
        detail.setAttribute('caption',  post.content ?? '');
        detail.setAttribute('image',    post.image_url ?? '');
        detail.setAttribute('likes',       post.like_count ?? 0);
        detail.setAttribute('comments',    post.comment_count ?? 0);
        detail.setAttribute('liked-by-me', post.liked_by_me ? 'true' : 'false');
        detail.setAttribute('saved-by-me', post.saved_by_me ? 'true' : 'false');
        detail.setAttribute('mine',        isMyPost ? 'true' : 'false');
        detail.setAttribute('tags',        JSON.stringify(post.tags ?? []));
        postContainer.appendChild(detail);

        const authorCardEl = document.createElement('user-card');
        authorCardEl.setAttribute('username',     post.author_username ?? 'user');
        authorCardEl.setAttribute('display-name', post.author_username ?? 'user');
        authorCardEl.setAttribute('avatar',       post.author_avatar_url ?? '');
        authorCardEl.setAttribute('is-me',        isMyPost ? 'true' : 'false');
        try {
          const authorData = await getUser(post.author_username);
          authorCardEl.setAttribute('avatar',         authorData.avatar_url ?? '');
          authorCardEl.setAttribute('followers',      authorData.follower_count ?? '0');
          authorCardEl.setAttribute('following',      authorData.following_count ?? '0');
          authorCardEl.setAttribute('followed-by-me', authorData.followed_by_me ? 'true' : 'false');
        } catch { /* sem sessão ou erro, mostra defaults */ }
        authorCard.appendChild(authorCardEl);

        commentsSection.hidden = false;
        await loadComments();
      } catch {
        postContainer.innerHTML = '<p class="feed__status feed__status--error">Erro ao carregar post.</p>';
      }
    }

    async function loadComments() {
      try {
        const comments = await getComments(postId);
        commentsList.innerHTML = '';

        if (!comments.length) {
          commentsList.innerHTML = '<p class="feed__status">Ainda não há comentários.</p>';
          return 0;
        }

        comments.forEach((comment) => {
          const item = document.createElement('comment-item');
          item.setAttribute('comment-id',   comment.id);
          item.setAttribute('username',     comment.author_username ?? 'user');
          item.setAttribute('display-name', comment.author_username ?? 'user');
          item.setAttribute('avatar',       comment.author_avatar_url ?? '');
          item.setAttribute('content',      comment.content ?? '');
          item.setAttribute('mine',         currentUserId && comment.author_id === currentUserId ? 'true' : 'false');
          commentsList.appendChild(item);
        });

        return comments.length;
      } catch {
        commentsList.innerHTML = '<p class="feed__status feed__status--error">Erro ao carregar comentários.</p>';
        return null;
      }
    }

    function updateCommentCounter(count) {
      if (count === null) return;
      const countEl = postContainer.querySelector('.post-detail__comment-count');
      if (countEl) countEl.textContent = count;
    }

    document.addEventListener('comment-delete', async (e) => {
      if (!confirm('Apagar comentário?')) return;
      try {
        await deleteComment(postId, e.detail.commentId);
        updateCommentCounter(await loadComments());
      } catch {
        alert('Erro ao apagar comentário.');
      }
    });

    document.addEventListener('comment-submit', async (e) => {
      if (!localStorage.getItem('token')) {
        window.location.href = '/pages/login.html';
        return;
      }
      try {
        await createComment(postId, { content: e.detail.content });
        sessionStorage.setItem('feed-stale', '1');
        updateCommentCounter(await loadComments());
      } catch {
        alert('Erro ao publicar comentário.');
      }
    });

    document.addEventListener('user-follow', async (e) => {
      if (!localStorage.getItem('token')) {
        window.location.href = '/pages/login.html';
        return;
      }
      try {
        if (e.detail.followed) await followUser(e.detail.username);
        else await unfollowUser(e.detail.username);
        sessionStorage.setItem('profile-stale', '1');
        sessionStorage.setItem('feed-stale', '1');
      } catch (err) { console.error('follow error', err); }
    });

    document.addEventListener('post-like', async (e) => {
      try {
        if (e.detail.liked) await likePost(e.detail.postId);
        else await unlikePost(e.detail.postId);
      } catch (err) { console.error('like error', err); }
    });

    document.addEventListener('post-save', async (e) => {
      try {
        if (e.detail.saved) await savePost(e.detail.postId);
        else await unsavePost(e.detail.postId);
        sessionStorage.setItem('feed-stale', '1');
      } catch (err) { console.error('save error', err); }
    });

    document.addEventListener('post-delete', async (e) => {
      if (!confirm('Apagar este post?')) return;
      try {
        await deletePost(e.detail.postId);
        window.location.href = '/pages/feed.html';
      } catch { alert('Erro ao apagar post.'); }
    });

    document.addEventListener('post-edit', async (e) => {
      try {
        await updatePost(e.detail.postId, { content: e.detail.content });
        const detail = postContainer.querySelector('post-detail');
        detail?.updateCaption(e.detail.content);
      } catch { alert('Erro ao editar post.'); }
    });

    loadPost();
  </script>

</body>
</html>
